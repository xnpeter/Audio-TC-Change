<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio TC Change</title>
  <meta name="theme-color" content="#202a36">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Audio TC Change">
  <link rel="manifest" href="./bwf-timecode.webmanifest">
  <link rel="icon" href="./bwf-timecode-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./bwf-timecode-icon-192.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --ink: #18202a;
      --muted: #667085;
      --soft: #f7f9fb;
      --line: #d7dee8;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --accent-soft: #e7f4f2;
      --blue: #2f5f98;
      --danger: #b42318;
      --warn: #b54708;
      --ok: #087443;
      --shadow: 0 18px 50px rgba(24, 32, 42, 0.12);
      --timecode-width: 520px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, #f7f9fc 0, var(--bg) 260px);
      color: var(--ink);
      min-height: 100vh;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      height: 40px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 700;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }

    button:hover { border-color: #aab4c3; transform: translateY(-1px); }
    button:disabled { opacity: 0.48; cursor: not-allowed; }
    button:disabled:hover { transform: none; }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.18);
    }

    .primary:hover { border-color: var(--accent-strong); background: var(--accent-strong); }

    .danger {
      border-color: #f4c7c3;
      color: var(--danger);
      background: #fffafa;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }

    header {
      background: #202a36;
      color: #fff;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      font-size: 20px;
      line-height: 1.2;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0;
    }

    .title-block {
      display: grid;
      gap: 4px;
    }

    .subtitle {
      color: #c8d2df;
      font-size: 13px;
      line-height: 1.35;
    }

    .header-meta {
      color: #d7dee8;
      font-size: 13px;
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .install-btn {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 13px;
      box-shadow: none;
    }

    .install-btn[hidden] {
      display: none;
    }

    .install-btn:hover {
      transform: none;
      background: rgba(255, 255, 255, 0.18);
    }

    .toolbar {
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      padding: 16px;
      display: grid;
      grid-template-columns: var(--timecode-width) 122px minmax(86px, auto) minmax(86px, auto);
      gap: 12px;
      align-items: end;
      justify-content: start;
      backdrop-filter: blur(16px);
    }

    .toolbar > button {
      height: 46px;
      min-width: 72px;
      justify-content: center;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 650;
    }

    input, select {
      height: 40px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 11px;
      min-width: 0;
      font-weight: 650;
    }

    input:focus, select:focus, button:focus {
      outline: 3px solid rgba(15, 118, 110, 0.18);
      outline-offset: 1px;
    }

    .select-field {
      position: relative;
      min-width: 0;
    }

    .select-field select {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
    }

    .select-button {
      width: 100%;
      height: 46px;
      justify-content: space-between;
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
      box-shadow: none;
      padding: 0 10px 0 11px;
      font-weight: 650;
    }

    .select-button:hover {
      transform: none;
      border-color: #aab4c3;
      background: #fdfefe;
    }

    .select-button::after {
      content: "";
      width: 8px;
      height: 8px;
      border-right: 2px solid #667085;
      border-bottom: 2px solid #667085;
      transform: rotate(45deg) translateY(-2px);
      transition: transform 140ms ease;
    }

    .select-field.open .select-button {
      border-color: #a7c9c5;
      outline: 3px solid rgba(15, 118, 110, 0.18);
      outline-offset: 1px;
    }

    .select-field.open .select-button::after {
      transform: rotate(225deg) translate(-1px, -1px);
    }

    .select-menu {
      position: absolute;
      z-index: 20;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      max-height: min(420px, calc(100vh - 190px));
      overflow: auto;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .select-menu[hidden] {
      display: none;
    }

    .select-option {
      width: 100%;
      height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--ink);
      justify-content: flex-start;
      padding: 0 10px;
      box-shadow: none;
      font-weight: 650;
    }

    .select-option:hover,
    .select-option.active {
      transform: none;
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .select-option[aria-selected="true"] {
      background: #edf3f7;
      color: var(--ink);
    }

    .timecode-control {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      height: 40px;
    }

    .timecode-control:focus-within {
      outline: 3px solid rgba(15, 118, 110, 0.18);
      outline-offset: 1px;
      border-color: #a7c9c5;
    }

    .timecode-control input {
      border: 0;
      border-radius: 0;
      height: 40px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .timecode-control input:focus {
      outline: none;
    }

    .toolbar .timecode-control {
      grid-template-columns: 52px minmax(0, 1fr) 30px;
      height: 46px;
    }

    .toolbar .timecode-control input {
      height: 46px;
      background: transparent;
      padding: 0 14px;
      font-size: 21px;
      font-weight: 750;
    }

    .calc-expression .timecode-control {
      grid-template-columns: minmax(0, 1fr) 30px;
      height: 46px;
    }

    .calculator .timecode-control input {
      border: 0;
      border-radius: 0;
      height: 46px;
      background: transparent;
    }

    .app.drag-over::after {
      content: "";
      position: fixed;
      inset: 0;
      border: 4px dashed var(--accent);
      background: rgba(15, 118, 110, 0.04);
      pointer-events: none;
      z-index: 999;
    }

    .sign-toggle {
      width: 52px;
      height: 46px;
      padding: 0;
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 24px;
      font-weight: 850;
      box-shadow: none;
      min-width: 0;
    }

    .sign-toggle[data-sign="-1"] {
      background: #fff3e5;
      color: var(--warn);
    }

    .sign-toggle:hover {
      transform: none;
      background: #dff0ed;
    }

    .sign-toggle[data-sign="-1"]:hover {
      background: #ffe7c7;
    }

    .tc-steppers {
      display: grid;
      grid-template-rows: 1fr 1fr;
      border-left: 1px solid var(--line);
      background: #f8fafc;
      min-height: 0;
    }

    .tc-step {
      height: 20px;
      width: 30px;
      min-width: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
      color: #475467;
      background: transparent;
      box-shadow: none;
    }

    .tc-step + .tc-step {
      border-top: 1px solid var(--line);
    }

    .tc-step:hover {
      transform: none;
      background: #edf3f7;
    }

    main {
      padding: 20px 28px 28px;
      display: grid;
      gap: 16px;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      min-height: 72px;
      box-shadow: 0 8px 24px rgba(24, 32, 42, 0.05);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      margin-bottom: 6px;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }

    .calculator {
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      display: grid;
      gap: 14px;
      box-shadow: var(--shadow);
    }

    .calc-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .calc-title {
      font-size: 17px;
      line-height: 1.2;
      margin: 0;
      font-weight: 800;
      letter-spacing: 0;
    }

    .calc-expression {
      display: grid;
      grid-template-columns: var(--timecode-width) 52px var(--timecode-width) auto minmax(220px, 420px) auto;
      gap: 12px;
      align-items: end;
      justify-content: start;
    }

    .calculator label {
      color: var(--muted);
    }

    .calculator input,
    .calc-result {
      height: 46px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
      border-radius: 6px;
      padding: 0 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 21px;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .calculator input:focus {
      outline-color: rgba(15, 118, 110, 0.24);
      border-color: var(--accent);
    }

    .calc-operator {
      width: 52px;
      height: 46px;
      padding: 0;
      justify-content: center;
      border-color: var(--line);
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-radius: 6px;
      font-size: 24px;
      font-weight: 850;
      box-shadow: none;
    }

    .calc-operator[data-op="-"] {
      background: #fff3e5;
      color: var(--warn);
    }

    .calc-operator:hover {
      transform: none;
      border-color: var(--accent);
      background: #dff0ed;
    }

    .calc-operator[data-op="-"]:hover {
      background: #ffe7c7;
    }

    .calc-equals {
      color: var(--muted);
      font-size: 22px;
      line-height: 46px;
      font-weight: 800;
      text-align: center;
    }

    .calc-result {
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--accent-strong);
      font-weight: 750;
    }

    .calc-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: end;
    }

    .calculator .primary {
      height: 46px;
    }

    .calculator button {
      height: 46px;
    }

    .calculator .tc-step {
      width: 30px;
      height: 23px;
      min-height: 0;
      padding: 0;
      font-size: 10px;
    }

    .toolbar .tc-step {
      height: 23px;
    }

    .workspace {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .table-head {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .table-title {
      font-size: 15px;
      font-weight: 750;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .phase {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 12px;
      font-weight: 750;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
      overflow-wrap: anywhere;
    }

    .table-wrap {
      overflow: auto;
      min-height: 330px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1260px;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #edf0f5;
      padding: 10px 11px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8fafc;
      color: #475467;
      font-size: 12px;
      font-weight: 750;
      border-bottom: 1px solid var(--line);
    }

    tbody tr:hover { background: #f8fbfb; }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    .pending {
      color: #98a2b3;
    }

    .new-value {
      color: var(--accent-strong);
      font-weight: 750;
    }

    .empty {
      height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 650;
      background: linear-gradient(180deg, #fff, #fbfcfd);
      user-select: none;
      cursor: default;
    }

    .empty::before {
      content: "↓";
      width: 56px;
      height: 56px;
      border: 3px solid var(--line);
      border-radius: 50%;
      font-size: 28px;
      line-height: 50px;
      text-align: center;
      color: var(--muted);
    }

    .log {
      min-height: 46px;
      max-height: 100px;
      overflow: auto;
      border-top: 1px solid var(--line);
      background: #202a36;
      color: #475467;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      padding: 10px 14px;
      white-space: pre-wrap;
      color: #dce5ef;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.ok { color: var(--ok); background: #e6f4ee; }
    .pill.idle { color: #475467; background: #edf1f5; }
    .pill.warn { color: var(--warn); background: #fff3e5; }
    .pill.err { color: var(--danger); background: #fef0ef; }

    @media (max-width: 980px) {
      header { align-items: flex-start; flex-direction: column; }
      .header-meta { justify-content: flex-start; }
      .toolbar { grid-template-columns: minmax(0, 1fr) auto; }
      .stats { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .calc-expression { grid-template-columns: minmax(0, 1fr) 52px minmax(0, 1fr); }
      .calc-equals, .calc-result, .calc-actions { grid-column: 1 / -1; }
      .calc-actions { justify-content: flex-start; }
    }

    @media (max-width: 620px) {
      header, main { padding-left: 14px; padding-right: 14px; }
      .toolbar { padding-left: 14px; padding-right: 14px; }
      .toolbar { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .calc-expression { grid-template-columns: 1fr; }
      .calc-operator { width: 100%; }
      .calc-equals, .calc-result, .calc-actions { grid-column: auto; }
      .calc-actions { display: grid; grid-template-columns: 1fr; }
      button { width: 100%; justify-content: center; }
      .table-head { align-items: flex-start; flex-direction: column; }
      .status { text-align: left; }
    }
    footer {
      padding: 16px 24px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    footer .footer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    footer .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    footer .github-link:hover {
      color: var(--accent);
    }
    footer .github-link svg {
      width: 16px;
      height: 16px;
    }
    footer .copyright {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-block">
        <h1>Audio TC Change</h1>
        <div class="subtitle">批量查看并修正 WAV / BWF 起始时间码</div>
      </div>
      <div class="header-meta">
        <span class="badge">RIFF/WAV bext TimeReference</span>
        <span class="badge">本地处理</span>
        <button id="installBtn" class="install-btn" type="button" hidden>安装应用</button>
      </div>
    </header>

    <section class="calculator" aria-label="timecode calculator">
      <div class="calc-head">
        <h2 class="calc-title">时间码计算器</h2>
      </div>
      <div class="calc-expression">
        <label>
          时间码 A
          <div class="timecode-control">
            <input id="calcStartInput" value="00:00:00:00" inputmode="numeric" aria-label="timecode A" autocomplete="off" spellcheck="false">
            <div class="tc-steppers">
              <button id="calcStartUpBtn" class="tc-step" type="button" title="A 增加一帧">▲</button>
              <button id="calcStartDownBtn" class="tc-step" type="button" title="A 减少一帧">▼</button>
            </div>
          </div>
        </label>
        <button id="calcOpBtn" class="calc-operator" type="button" data-op="+" title="切换加/减" aria-label="切换加减">+</button>
        <label>
          时间码 B
          <div class="timecode-control">
            <input id="calcEndInput" value="00:00:00:00" inputmode="numeric" aria-label="timecode B" autocomplete="off" spellcheck="false">
            <div class="tc-steppers">
              <button id="calcEndUpBtn" class="tc-step" type="button" title="B 增加一帧">▲</button>
              <button id="calcEndDownBtn" class="tc-step" type="button" title="B 减少一帧">▼</button>
            </div>
          </div>
        </label>
        <div class="calc-equals">=</div>
        <label>
          结果
          <div id="calcResult" class="calc-result">00:00:00:00</div>
        </label>
        <div class="calc-actions">
          <button id="calcBtn" type="button">计算</button>
          <button id="useCalcBtn" class="primary" type="button" disabled>使用计算结果</button>
        </div>
      </div>
    </section>

    <section class="toolbar" aria-label="controls">
      <label>
        偏移时间码
        <div class="timecode-control">
          <button id="offsetSignBtn" class="sign-toggle" type="button" data-sign="1" title="切换加/减偏移" aria-label="切换加减偏移">+</button>
          <input id="offsetInput" value="00:00:00:00" inputmode="numeric" aria-label="offset timecode" autocomplete="off" spellcheck="false">
          <div class="tc-steppers">
            <button id="tcUpBtn" class="tc-step" type="button" title="增加一帧">▲</button>
            <button id="tcDownBtn" class="tc-step" type="button" title="减少一帧">▼</button>
          </div>
        </div>
      </label>

      <label>
        帧率
        <div class="select-field" data-select>
          <select id="fpsInput" aria-label="frame rate">
            <option value="24" selected>24.00</option>
            <option value="23.976">23.976</option>
            <option value="25">25.00</option>
            <option value="29.97">29.97</option>
            <option value="29.97df">29.97 DF</option>

  <script>
    const LITTLE = true;
    const WAV_SUFFIX = /\.(wav|wave)$/i;

    const els = {
      offsetSignBtn: document.getElementById("offsetSignBtn"),
      offsetInput: document.getElementById("offsetInput"),
      tcUpBtn: document.getElementById("tcUpBtn"),
      tcDownBtn: document.getElementById("tcDownBtn"),
      fpsInput: document.getElementById("fpsInput"),
      fpsSelectButton: document.getElementById("fpsSelectButton"),
      fpsSelectMenu: document.getElementById("fpsSelectMenu"),
      calcStartInput: document.getElementById("calcStartInput"),
      calcStartUpBtn: document.getElementById("calcStartUpBtn"),
      calcStartDownBtn: document.getElementById("calcStartDownBtn"),
      calcEndInput: document.getElementById("calcEndInput"),
      calcEndUpBtn: document.getElementById("calcEndUpBtn"),
      calcEndDownBtn: document.getElementById("calcEndDownBtn"),
      calcOpBtn: document.getElementById("calcOpBtn"),
      calcResult: document.getElementById("calcResult"),
      calcBtn: document.getElementById("calcBtn"),
      useCalcBtn: document.getElementById("useCalcBtn"),
      previewBtn: document.getElementById("previewBtn"),
      applyBtn: document.getElementById("applyBtn"),
      fileCount: document.getElementById("fileCount"),
      offsetFrames: document.getElementById("offsetFrames"),
      offsetSamples: document.getElementById("offsetSamples"),
      sampleRates: document.getElementById("sampleRates"),
      stateText: document.getElementById("stateText"),
      installBtn: document.getElementById("installBtn"),
      statusLine: document.getElementById("statusLine"),
      phasePill: document.getElementById("phasePill"),
      previewTable: document.getElementById("previewTable"),
      previewBody: document.getElementById("previewBody"),
      emptyState: document.getElementById("emptyState"),
      log: document.getElementById("log"),
    };

    let directoryHandle = null;
    let records = [];
    let previews = [];
    let activeOffset = null;
    let calculatorOffset = null;

    function initCustomSelect(select, button, menu) {
      const field = select.closest("[data-select]");
      const buttonLabel = button.querySelector("span");

      function options() {
        return [...select.options];
      }

      function menuButtons() {
        return [...menu.querySelectorAll(".select-option")];
      }

      function selectedIndex() {
        return Math.max(0, select.selectedIndex);
      }

      function syncDisplay() {
        const selected = select.options[selectedIndex()];
        buttonLabel.textContent = selected ? selected.textContent : "";
        for (const item of menuButtons()) {
          const isSelected = item.dataset.value === select.value;
          item.setAttribute("aria-selected", String(isSelected));
          item.classList.toggle("active", isSelected);
        }
      }

      function closeMenu() {
        field.classList.remove("open");
        menu.hidden = true;
        button.setAttribute("aria-expanded", "false");
      }

      function openMenu() {
        field.classList.add("open");
        menu.hidden = false;
        button.setAttribute("aria-expanded", "true");
        syncDisplay();
        menuButtons()[selectedIndex()]?.scrollIntoView({ block: "nearest" });
      }

      function chooseIndex(index) {
        const next = options()[index];
        if (!next) return;
        select.value = next.value;
        syncDisplay();
        select.dispatchEvent(new Event("change", { bubbles: true }));
      }

      for (const option of options()) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "select-option";
        item.role = "option";
        item.dataset.value = option.value;
        item.textContent = option.textContent;
        item.addEventListener("click", () => {
          chooseIndex(options().findIndex(entry => entry.value === option.value));
          closeMenu();
          button.focus();
        });
        menu.appendChild(item);
      }

      button.addEventListener("click", () => {
        if (menu.hidden) openMenu();
        else closeMenu();
      });

      button.addEventListener("keydown", event => {
        const keyMoves = { ArrowDown: 1, ArrowUp: -1 };
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          if (menu.hidden) openMenu();
          else closeMenu();
          return;
        }
        if (event.key in keyMoves) {
          event.preventDefault();
          const nextIndex = Math.min(options().length - 1, Math.max(0, selectedIndex() + keyMoves[event.key]));
          chooseIndex(nextIndex);
          openMenu();
          return;
        }
        if (event.key === "Escape") {
          closeMenu();
        }
      });

      document.addEventListener("click", event => {
        if (!field.contains(event.target)) closeMenu();
      });

      select.addEventListener("change", syncDisplay);
      syncDisplay();
    }

    function setState(text, kind = "ok") {
      els.stateText.textContent = text;
      els.stateText.style.color = kind === "err" ? "var(--danger)" : kind === "warn" ? "var(--warn)" : "var(--ink)";
    }

    function log(line) {
      const time = new Date().toLocaleTimeString();
      els.log.textContent = `[${time}] ${line}\n` + els.log.textContent;
    }

    function gcd(a, b) {
      a = BigInt(a); b = BigInt(b);
      while (b !== 0n) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a < 0n ? -a : a;
    }

    function frac(n, d = 1n) {
      if (d === 0n) throw new Error("Invalid fraction.");
      if (d < 0n) { n = -n; d = -d; }
      const g = gcd(n, d);
      return { n: n / g, d: d / g };
    }

    function addFrac(a, b) {
      return frac(a.n * b.d + b.n * a.d, a.d * b.d);
    }

    function mulFrac(a, b) {
      return frac(a.n * b.n, a.d * b.d);
    }

    function divFrac(a, b) {
      return frac(a.n * b.d, a.d * b.n);
    }

    function floorFrac(a) {
      return a.n / a.d;
    }

    function nominalFpsFor(fps) {
      if (fps.nominal) return fps.nominal;
      return BigInt(Math.round(Number(fps.n) / Number(fps.d)));
    }

    function parseFps(value) {
      const presets = {
        "23.976": { rate: frac(24000n, 1001n), nominal: 24n, drop: false },
        "23.98": { rate: frac(24000n, 1001n), nominal: 24n, drop: false },
        "24": { rate: frac(24n), nominal: 24n, drop: false },
        "25": { rate: frac(25n), nominal: 25n, drop: false },
        "29.97": { rate: frac(30000n, 1001n), nominal: 30n, drop: false },
        "29.97df": { rate: frac(30000n, 1001n), nominal: 30n, drop: true },
        "30": { rate: frac(30n), nominal: 30n, drop: false },
        "48": { rate: frac(48n), nominal: 48n, drop: false },
        "50": { rate: frac(50n), nominal: 50n, drop: false },
        "59.94": { rate: frac(60000n, 1001n), nominal: 60n, drop: false },
        "59.94df": { rate: frac(60000n, 1001n), nominal: 60n, drop: true },
        "60": { rate: frac(60n), nominal: 60n, drop: false },
        "96": { rate: frac(96n), nominal: 96n, drop: false },
        "100": { rate: frac(100n), nominal: 100n, drop: false },
        "119.88": { rate: frac(120000n, 1001n), nominal: 120n, drop: false },
        "119.88df": { rate: frac(120000n, 1001n), nominal: 120n, drop: true },
        "120": { rate: frac(120n), nominal: 120n, drop: false },
      };
      if (presets[value]) return { ...presets[value] };
      let rate;
      if (value.includes("/")) {
        const [n, d] = value.split("/").map(v => BigInt(v.trim()));
        rate = frac(n, d);
      } else {
        const parts = value.split(".");
        if (parts.length === 1) rate = frac(BigInt(parts[0]));
        else {
          const scale = 10n ** BigInt(parts[1].length);
          rate = frac(BigInt(parts[0]) * scale + BigInt(parts[1]), scale);
        }
      }
      return { ...rate, rate, nominal: nominalFpsFor(rate), drop: false };
    }

    function fpsRate(fps) {
      return fps.rate || fps;
    }

    function dropFramesFor(fps) {
      if (!fps.drop) return 0n;
      const nominal = nominalFpsFor(fps);
      if (nominal % 30n !== 0n) throw new Error("DF 只支持 29.97 / 59.94 / 119.88");
      return nominal * 2n / 30n;
    }

    function timecodeSeparator(fps) {
      return fps.drop ? ";" : ":";
    }

    function frameDigitsFor(fps) {
      return Math.max(2, String(nominalFpsFor(fps) - 1n).length);
    }

    function timecodeDigitPositions(fps = defaultDisplayFps()) {
      const frameDigits = frameDigitsFor(fps);
      const positions = [0, 1, 3, 4, 6, 7];
      for (let i = 0; i < frameDigits; i++) positions.push(9 + i);
      return positions;
    }

    function timecodeDigitCount(fps = defaultDisplayFps()) {
      return 6 + frameDigitsFor(fps);
    }

    function fpsLabel(fps) {
      const nominal = nominalFpsFor(fps);
      const rate = fpsRate(fps);
      const label = rate.d === 1001n && rate.n % 1000n === 0n
        ? (Number(rate.n / 1000n) / 1000).toFixed(2)
        : Number(nominal).toFixed(2);
      return `${label}${fps.drop ? " DF" : ""} FPS`;
    }

    function offsetSign() {
      return els.offsetSignBtn.dataset.sign === "-1" ? -1n : 1n;
    }

    function parseOffset(raw, fps) {
      const { hh, mm, ss, ff } = parseTimecodeParts(raw, fps);
      const sign = offsetSign();
      const frames = timecodeToFrames(raw, fps) * sign;
      const offsetSeconds = divFrac(frac(frames), fpsRate(fps));
      const signLabel = sign < 0n ? "-" : "+";
      const sep = timecodeSeparator(fps);
      return {
        label: `${signLabel}${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}${sep}${String(ff).padStart(2, "0")}`,
        fps,
        frames,
        seconds: offsetSeconds,
      };
    }

    function parseTimecodeParts(raw, fps) {
      const parts = raw.trim().replaceAll(";", ":").split(":");
      if (parts.length !== 4) throw new Error("时间码格式应为 HH:MM:SS:FF");
      const [hh, mm, ss, ff] = parts.map(part => {
        if (!/^\d+$/.test(part)) throw new Error("时间码只能包含数字");
        return Number(part);
      });
      const nominalFps = Number(nominalFpsFor(fps));
      if (hh < 0 || mm > 59 || ss > 59) throw new Error("分钟和秒不能超过 59");
      if (ff >= nominalFps) throw new Error(`帧数必须小于 ${nominalFps}`);
      const dropFrames = Number(dropFramesFor(fps));
      if (dropFrames && ss === 0 && mm % 10 !== 0 && ff < dropFrames) {
        throw new Error(`DF 时间码不存在：每个非 10 分钟整点会跳过前 ${dropFrames} 帧`);
      }
      return { hh, mm, ss, ff };
    }

    function timecodeToFrames(raw, fps) {
      const { hh, mm, ss, ff } = parseTimecodeParts(raw, fps);
      const nominal = nominalFpsFor(fps);
      const nominalFrames = BigInt(hh * 3600 + mm * 60 + ss) * nominal + BigInt(ff);
      const dropFrames = dropFramesFor(fps);
      if (!dropFrames) return nominalFrames;
      const totalMinutes = BigInt(hh * 60 + mm);
      return nominalFrames - dropFrames * (totalMinutes - totalMinutes / 10n);
    }

    function framesToTimecode(frames, fps) {
      const nominal = nominalFpsFor(fps);
      let safeFrames = frames < 0n ? 0n : frames;
      const dropFrames = dropFramesFor(fps);
      if (dropFrames) {
        const framesPerMinute = nominal * 60n - dropFrames;
        const framesPer10Minutes = nominal * 600n - dropFrames * 9n;
        const tenMinuteBlocks = safeFrames / framesPer10Minutes;
        const framesIntoBlock = safeFrames % framesPer10Minutes;
        const minuteDrops = framesIntoBlock < dropFrames ? 0n : (framesIntoBlock - dropFrames) / framesPerMinute;
        safeFrames += dropFrames * 9n * tenMinuteBlocks + dropFrames * minuteDrops;
      }
      const ff = safeFrames % nominal;
      const totalSeconds = safeFrames / nominal;
      const ss = totalSeconds % 60n;
      const mm = (totalSeconds / 60n) % 60n;
      const hh = totalSeconds / 3600n;
      return `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}${timecodeSeparator(fps)}${String(ff).padStart(frameDigitsFor(fps), "0")}`;
    }

    function formatTimecodeDigits(digits, fps = defaultDisplayFps()) {
      const frameDigits = frameDigitsFor(fps);
      const digitCount = 6 + frameDigits;
      const padded = digits.padEnd(digitCount, "0").slice(0, digitCount);
      return `${padded.slice(0, 2)}:${padded.slice(2, 4)}:${padded.slice(4, 6)}${timecodeSeparator(fps)}${padded.slice(6)}`;
    }

    function clampDigits(raw, fps = defaultDisplayFps()) {
      return raw.replace(/\D/g, "").slice(0, timecodeDigitCount(fps));
    }

    function digitIndexFromCaret(input, caret = null) {
      const fps = defaultDisplayFps();
      const pos = caret ?? input.selectionStart ?? input.value.length;
      const digitPositions = timecodeDigitPositions(fps);
      let index = digitPositions.findIndex(position => position >= pos);
      if (index === -1) index = digitPositions.length - 1;
      if (input.value[pos] === ":" || input.value[pos] === ";") index = Math.min(digitPositions.length - 1, index + 1);
      return index;
    }

    function setTimecodeValueFromDigits(input, digits, caretDigitIndex = null) {
      const fps = defaultDisplayFps();
      input.value = formatTimecodeDigits(digits, fps);
      if (caretDigitIndex !== null) {
        const digitPositions = timecodeDigitPositions(fps);
        const safe = Math.max(0, Math.min(digitPositions.length - 1, caretDigitIndex));
        input.setSelectionRange(digitPositions[safe], digitPositions[safe] + 1);
      }
    }

    function normalizeTimecodeInput(input = els.offsetInput, caretDigitIndex = null, invalidate = true) {
      setTimecodeValueFromDigits(input, clampDigits(input.value), caretDigitIndex);
      if (invalidate) invalidatePreview();
    }

    function stepTimecodeByFrames(input, deltaFrames, invalidate = true) {
      const fps = parseFps(els.fpsInput.value);
      const frames = timecodeToFrames(input.value, fps) + BigInt(deltaFrames);
      input.value = framesToTimecode(frames, fps);
      input.setSelectionRange(input.value.length, input.value.length);
      if (invalidate) invalidatePreview();
    }

    function timecodeDigitIndexAtCaret(input) {
      const fps = defaultDisplayFps();
      const caret = input.selectionStart ?? input.value.length;
      const digitPositions = timecodeDigitPositions(fps);
      let index = digitPositions.findIndex(position => position >= caret);
      if (index === -1) index = digitPositions.length - 1;
      if (input.value[caret] === ":" || input.value[caret] === ";") index = Math.max(0, index - 1);
      return index;
    }

    function stepTimecodeAtCaret(input, direction, invalidate = true) {
      const fps = parseFps(els.fpsInput.value);
      const nominal = nominalFpsFor(fps);
      const frameDigits = frameDigitsFor(fps);
      const weights = [
        nominal * 36000n,
        nominal * 3600n,
        nominal * 600n,
        nominal * 60n,
        nominal * 10n,
        nominal,
      ];
      for (let place = frameDigits - 1; place >= 0; place--) {
        weights.push(10n ** BigInt(place));
      }
      const digitPositions = timecodeDigitPositions(fps);
      const digitIndex = timecodeDigitIndexAtCaret(input);
      const frames = timecodeToFrames(input.value, fps) + weights[digitIndex] * BigInt(direction);
      input.value = framesToTimecode(frames, fps);
      const caret = digitPositions[digitIndex];
      input.setSelectionRange(caret, caret + 1);
      if (invalidate) invalidatePreview();
    }

    function insertTimecodeDigits(input, text, invalidate = true) {
      const fps = defaultDisplayFps();
      const digitCount = timecodeDigitCount(fps);
      const incoming = clampDigits(text, fps);
      if (!incoming) return;
      const selectionStart = input.selectionStart ?? 0;
      const selectionEnd = input.selectionEnd ?? selectionStart;
      const wholeValueSelected = selectionStart === 0 && selectionEnd >= input.value.length;
      const oldDigits = wholeValueSelected ? "0".repeat(digitCount) : clampDigits(input.value, fps).padEnd(digitCount, "0").slice(0, digitCount);
      const start = digitIndexFromCaret(input, input.selectionStart ?? 0);
      const nextDigits = (
        oldDigits.slice(0, start) +
        incoming +
        oldDigits.slice(start + incoming.length)
      ).slice(0, digitCount);
      setTimecodeValueFromDigits(input, nextDigits, start + incoming.length);
      if (invalidate) invalidatePreview();
    }

    function deleteTimecodeDigit(input, backspace, invalidate = true) {
      const fps = defaultDisplayFps();
      const digitCount = timecodeDigitCount(fps);
      const oldDigits = clampDigits(input.value, fps).padEnd(digitCount, "0").slice(0, digitCount);
      const index = digitIndexFromCaret(input, input.selectionStart ?? 0);
      const target = backspace ? Math.max(0, index - 1) : index;
      const nextDigits = oldDigits.slice(0, target) + "0" + oldDigits.slice(target + 1);
      setTimecodeValueFromDigits(input, nextDigits, target);
      if (invalidate) invalidatePreview();
    }

    function toggleOffsetSign() {
      const next = offsetSign() < 0n ? "1" : "-1";
      els.offsetSignBtn.dataset.sign = next;
      els.offsetSignBtn.textContent = next === "-1" ? "-" : "+";
      els.offsetSignBtn.title = next === "-1" ? "当前为减偏移，点击切换为加" : "当前为加偏移，点击切换为减";
      els.offsetSignBtn.setAttribute("aria-label", next === "-1" ? "当前为减偏移" : "当前为加偏移");
      invalidatePreview();
    }

    function samplesForRate(offset, sampleRate) {
      const samples = mulFrac(offset.seconds, frac(BigInt(sampleRate)));
      if (samples.d !== 1n) throw new Error(`${sampleRate} Hz 下偏移不是整数采样：${samples.n}/${samples.d}`);
      return samples.n;
    }

    function ascii(view, pos, len) {
      let out = "";
      for (let i = 0; i < len; i++) out += String.fromCharCode(view.getUint8(pos + i));
      return out;
    }

    async function readDataView(file, start, length) {
      const blob = file.slice(start, start + length);
      return new DataView(await blob.arrayBuffer());
    }

    async function scanWave(fileHandle) {
      const file = await fileHandle.getFile();
      const header = await readDataView(file, 0, Math.min(file.size, 12));
      const name = file.name;
      if (header.byteLength < 12 || ascii(header, 0, 4) !== "RIFF" || ascii(header, 8, 4) !== "WAVE") {
        throw new Error(`${name}: 不是 RIFF/WAVE 文件`);
      }

      const riffSize = header.getUint32(4, LITTLE);
      let pos = 12;
      let sampleRate = null;
      let channels = null;
      let bitsPerSample = null;
      let blockAlign = null;
      let timeReferenceOffset = null;
      let oldTimeReference = null;
      let dataSize = null;

      while (pos + 8 <= Math.min(file.size, riffSize + 8)) {
        const chunkHeader = await readDataView(file, pos, 8);
        if (chunkHeader.byteLength < 8) throw new Error(`${name}: chunk header 截断`);
        const chunkId = ascii(chunkHeader, 0, 4);
        const chunkSize = chunkHeader.getUint32(4, LITTLE);
        const chunkStart = pos + 8;

        if (chunkId === "fmt ") {
          if (chunkSize < 16) throw new Error(`${name}: fmt chunk 过短`);
          const fmt = await readDataView(file, chunkStart, Math.min(chunkSize, 40));
          channels = fmt.getUint16(2, LITTLE);
          sampleRate = fmt.getUint32(4, LITTLE);
          blockAlign = fmt.getUint16(12, LITTLE);
          bitsPerSample = fmt.getUint16(14, LITTLE);
        } else if (chunkId === "bext") {
          if (chunkSize < 346) throw new Error(`${name}: bext chunk 过短`);
          timeReferenceOffset = chunkStart + 338;
          const timeReference = await readDataView(file, timeReferenceOffset, 8);
          oldTimeReference = timeReference.getBigUint64(0, LITTLE);
        } else if (chunkId === "data") {
          dataSize = chunkSize;
          if (sampleRate !== null && oldTimeReference !== null) break;
        }

        pos = chunkStart + chunkSize + (chunkSize & 1);
      }

      if (sampleRate === null || blockAlign === null) throw new Error(`${name}: 缺少 fmt chunk`);
      if (oldTimeReference === null || timeReferenceOffset === null) throw new Error(`${name}: 缺少 BWF bext TimeReference`);
      if (dataSize === null) throw new Error(`${name}: 缺少 data chunk`);
      if (dataSize % blockAlign !== 0) throw new Error(`${name}: data chunk 未按 block align 对齐`);

      return {
        fileHandle,
        file,
        name,
        sampleRate,
        channels,
        bitsPerSample,
        blockAlign,
        timeReferenceOffset,
        oldTimeReference,
        durationSamples: BigInt(dataSize / blockAlign),
      };
    }

    function samplesToTimecode(samples, sampleRate, fps) {
      const totalFrames = mulFrac(frac(samples, BigInt(sampleRate)), fpsRate(fps));
      const whole = floorFrac(totalFrames);
      const sub = frac(totalFrames.n - whole * totalFrames.d, totalFrames.d);
      const base = framesToTimecode(whole, fps);
      return sub.n === 0n ? base : `${base} + ${sub.n}/${sub.d}fr`;
    }

    function calculateTimecodeDifference() {
      const fps = parseFps(els.fpsInput.value);
      normalizeTimecodeInput(els.calcStartInput, null, false);
      normalizeTimecodeInput(els.calcEndInput, null, false);
      const startFrames = timecodeToFrames(els.calcStartInput.value, fps);
      const endFrames = timecodeToFrames(els.calcEndInput.value, fps);
      const op = els.calcOpBtn.dataset.op === "-" ? "-" : "+";
      const resultFrames = op === "-" ? startFrames - endFrames : startFrames + endFrames;
      const absFrames = resultFrames < 0n ? -resultFrames : resultFrames;
      const signLabel = resultFrames < 0n ? "-" : "";
      const tc = framesToTimecode(absFrames, fps);
      calculatorOffset = { frames: resultFrames, tc };
      els.calcResult.textContent = `${signLabel}${tc}`;
      els.useCalcBtn.disabled = false;
    }

    function toggleCalculatorOperator() {
      const next = els.calcOpBtn.dataset.op === "-" ? "+" : "-";
      els.calcOpBtn.dataset.op = next;
      els.calcOpBtn.textContent = next;
      calculatorOffset = null;
      els.useCalcBtn.disabled = true;
    }

    function useCalculatorResult() {
      if (!calculatorOffset) calculateTimecodeDifference();
      const result = calculatorOffset;
      els.offsetSignBtn.dataset.sign = result.frames < 0n ? "-1" : "1";
      els.offsetSignBtn.textContent = result.frames < 0n ? "-" : "+";
      els.offsetSignBtn.title = result.frames < 0n ? "当前为减偏移，点击切换为加" : "当前为加偏移，点击切换为减";
      els.offsetSignBtn.setAttribute("aria-label", result.frames < 0n ? "当前为减偏移" : "当前为加偏移");
      els.offsetInput.value = result.tc;
      invalidatePreview();
    }

    function formatDuration(samples, sampleRate) {
      const seconds = Number(samples) / sampleRate;
      return `${seconds.toFixed(3)}s`;
    }

    function defaultDisplayFps() {
      return parseFps(els.fpsInput.value);
    }

    function toCsvValue(value) {
      const text = String(value);
      return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    function manifestCsv() {
      const headers = [
        "file", "sample_rate", "channels", "bits_per_sample", "time_reference_offset_byte",
        "offset_tc", "offset_frames", "offset_samples", "old_time_reference",
        "new_time_reference", "duration_samples", "old_start_tc", "new_start_tc",
        "old_end_tc", "new_end_tc"
      ];
      const rows = previews.map(p => ({
        file: p.name,
        sample_rate: p.sampleRate,
        channels: p.channels,
        bits_per_sample: p.bitsPerSample,
        time_reference_offset_byte: p.timeReferenceOffset,
        offset_tc: p.offset.label,
        offset_frames: p.offset.frames,
        offset_samples: p.sampleOffset,
        old_time_reference: p.oldTimeReference,
        new_time_reference: p.newTimeReference,
        duration_samples: p.durationSamples,
        old_start_tc: p.oldStartTc,
        new_start_tc: p.newStartTc,
        old_end_tc: p.oldEndTc,
        new_end_tc: p.newEndTc,
      }));
      return [headers.join(","), ...rows.map(row => headers.map(h => toCsvValue(row[h])).join(","))].join("\n");
    }

    function renderRows() {
      els.previewBody.textContent = "";
      const sampleRates = new Set();
      const sampleOffsets = new Set();
      const fps = defaultDisplayFps();
      const previewByName = new Map(previews.map(preview => [preview.name, preview]));

      for (const record of records) {
        const preview = previewByName.get(record.name);
        sampleRates.add(record.sampleRate);
        if (preview) sampleOffsets.add(preview.sampleOffset.toString());
        const row = document.createElement("tr");
        const cells = [
          record.name,
          record.sampleRate,
          record.channels,
          record.bitsPerSample,
          samplesToTimecode(record.oldTimeReference, record.sampleRate, fps),
          preview ? preview.newStartTc : "待预览",
          samplesToTimecode(record.oldTimeReference + record.durationSamples, record.sampleRate, fps),
          preview ? preview.newEndTc : "待预览",
          record.oldTimeReference,
          preview ? preview.newTimeReference : "待预览",
          formatDuration(record.durationSamples, record.sampleRate),
        ];
        cells.forEach((cell, index) => {
          const td = document.createElement("td");
          td.textContent = String(cell);
          if ([4, 5, 6, 7, 8, 9].includes(index)) td.classList.add("mono");
          if (!preview && [5, 7, 9].includes(index)) td.classList.add("pending");
          if (preview && [5, 7, 9].includes(index)) td.classList.add("new-value");
          row.appendChild(td);
        });
        const result = document.createElement("td");
        const pill = document.createElement("span");
        pill.className = preview ? "pill ok" : "pill idle";
        pill.textContent = preview ? "Ready" : "Original";
        result.appendChild(pill);
        row.appendChild(result);
        els.previewBody.appendChild(row);
      }

      els.previewTable.hidden = records.length === 0;
      els.emptyState.hidden = records.length > 0;
      els.fileCount.textContent = records.length;
      els.offsetFrames.textContent = activeOffset ? activeOffset.frames.toString() : "-";
      els.offsetSamples.textContent = sampleOffsets.size ? Array.from(sampleOffsets).join(", ") : "-";
      els.sampleRates.textContent = sampleRates.size ? Array.from(sampleRates).join(", ") : "-";
      els.phasePill.textContent = previews.length ? "修改预览" : "原始信息";
    }

    async function runPreview() {
      els.applyBtn.disabled = true;
      previews = [];
      activeOffset = null;
      renderRows();
      setState("预览中", "warn");
      els.statusLine.textContent = "Calculating shifted timecode...";

      const fps = parseFps(els.fpsInput.value);
      const offset = parseOffset(els.offsetInput.value, fps);
      if (!records.length) throw new Error("请拖入文件夹或音频文件");

      for (const record of records) {
        const sampleOffset = samplesForRate(offset, record.sampleRate);
        const newTimeReference = record.oldTimeReference + sampleOffset;
        if (newTimeReference < 0n) {
          throw new Error(`${record.name}: 减去该偏移后 TimeReference 会小于 0`);
        }
        const oldStartTc = samplesToTimecode(record.oldTimeReference, record.sampleRate, fps);
        const newStartTc = samplesToTimecode(newTimeReference, record.sampleRate, fps);
        const oldEndTc = samplesToTimecode(record.oldTimeReference + record.durationSamples, record.sampleRate, fps);
        const newEndTc = samplesToTimecode(newTimeReference + record.durationSamples, record.sampleRate, fps);
        previews.push({
          ...record,
          offset,
          sampleOffset,
          newTimeReference,
          oldStartTc,
          newStartTc,
          oldEndTc,
          newEndTc,
          duration: formatDuration(record.durationSamples, record.sampleRate),
        });
      }

      activeOffset = offset;
      renderRows();
      els.applyBtn.disabled = false;
      setState("可写入");
      els.statusLine.textContent = `${previews.length} 个文件已生成修改预览`;
      log(`Preview OK: ${previews.length} files, offset ${offset.label}, ${offset.frames} frames`);
    }

    async function writeManifestToFolder() {
      const now = new Date();
      const stamp = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0"),
        "_",
        String(now.getHours()).padStart(2, "0"),
        String(now.getMinutes()).padStart(2, "0"),
        String(now.getSeconds()).padStart(2, "0")
      ].join("");
      const handle = await directoryHandle.getFileHandle(`timecode_fix_manifest_${stamp}.csv`, { create: true });
      const writable = await handle.createWritable();
      await writable.write(new Blob([manifestCsv()], { type: "text/csv;charset=utf-8" }));
      await writable.close();
      return handle.name;
    }

    async function applyChanges() {
      if (!previews.length) throw new Error("没有可写入的预览");
      const ok = window.confirm(`写入 ${previews.length} 个 WAV 的 BWF TimeReference？`);
      if (!ok) return;

      setState("写入中", "warn");
      els.applyBtn.disabled = true;
      els.statusLine.textContent = "Writing...";

      for (const preview of previews) {
        const patch = new ArrayBuffer(8);
        new DataView(patch).setBigUint64(0, preview.newTimeReference, LITTLE);
        const writable = await preview.fileHandle.createWritable({ keepExistingData: true });
        await writable.write({ type: "write", position: preview.timeReferenceOffset, data: patch });
        await writable.close();
      }

      for (const preview of previews) {
        const fresh = await scanWave(preview.fileHandle);
        if (fresh.oldTimeReference !== preview.newTimeReference) {
          throw new Error(`${preview.name}: 校验失败`);
        }
      }

      const manifestName = await writeManifestToFolder();
      for (const pill of document.querySelectorAll(".pill")) {
        pill.className = "pill ok";
        pill.textContent = "Written";
      }
      setState("完成");
      els.statusLine.textContent = manifestName;
      log(`Write OK: ${previews.length} files; ${manifestName}`);
    }

    function invalidatePreview() {
      if (!records.length || !previews.length) {
        renderRows();
        return;
      }
      previews = [];
      activeOffset = null;
      els.applyBtn.disabled = true;
      setState("需重新预览", "warn");
      els.statusLine.textContent = "偏移或帧率已改变，请重新点击预览";
      renderRows();
    }

    async function guarded(fn) {
      try {
        await fn();
      } catch (error) {
        setState("错误", "err");
        els.statusLine.textContent = error.message;
        log(`ERROR: ${error.message}`);
      }
    }

    let deferredInstallPrompt = null;

    function setupPwa() {
      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault();
        deferredInstallPrompt = event;
        els.installBtn.hidden = false;
      });

      window.addEventListener("appinstalled", () => {
        deferredInstallPrompt = null;
        els.installBtn.hidden = true;
        log("PWA installed.");
      });

      els.installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        els.installBtn.hidden = true;
      });

      if (!("serviceWorker" in navigator)) {
        log("PWA: service worker is not supported in this browser.");
        return;
      }

      if (!["http:", "https:"].includes(window.location.protocol)) {
        log("PWA: open through http://127.0.0.1 or HTTPS to enable install/offline mode.");
        return;
      }

      const hadController = Boolean(navigator.serviceWorker.controller);
      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (!hadController || refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      navigator.serviceWorker.register("./bwf-timecode-sw.js")
        .then(registration => {
          registration.update();
          log("PWA: offline cache ready.");
        })
        .catch(error => log(`PWA ERROR: ${error.message}`));
    }

    els.previewBtn.addEventListener("click", () => guarded(runPreview));
    els.applyBtn.addEventListener("click", () => guarded(applyChanges));
    els.calcBtn.addEventListener("click", () => guarded(calculateTimecodeDifference));
    els.useCalcBtn.addEventListener("click", () => guarded(useCalculatorResult));
    els.calcOpBtn.addEventListener("click", toggleCalculatorOperator);
    els.offsetSignBtn.addEventListener("click", toggleOffsetSign);
    els.tcUpBtn.addEventListener("click", () => {
      try { stepTimecodeByFrames(els.offsetInput, 1); } catch (error) { log(`ERROR: ${error.message}`); }
    });
    els.tcDownBtn.addEventListener("click", () => {
      try { stepTimecodeByFrames(els.offsetInput, -1); } catch (error) { log(`ERROR: ${error.message}`); }
    });
    els.offsetInput.addEventListener("focus", () => els.offsetInput.select());
    els.offsetInput.addEventListener("input", () => normalizeTimecodeInput(els.offsetInput));
    els.offsetInput.addEventListener("paste", event => {
      event.preventDefault();
      insertTimecodeDigits(els.offsetInput, event.clipboardData.getData("text"));
    });
    els.offsetInput.addEventListener("blur", () => normalizeTimecodeInput(els.offsetInput));
    els.offsetInput.addEventListener("keydown", event => {
      if (event.metaKey || event.ctrlKey || event.altKey) return;
      try {
        if (/^\d$/.test(event.key)) {
          event.preventDefault();
          insertTimecodeDigits(els.offsetInput, event.key);
          return;
        }
        if (event.key === "Backspace" || event.key === "Delete") {
          event.preventDefault();
          deleteTimecodeDigit(els.offsetInput, event.key === "Backspace");
          return;
        }
        if (event.key === "ArrowUp" || event.key === "ArrowDown") {
          event.preventDefault();
          stepTimecodeAtCaret(els.offsetInput, event.key === "ArrowUp" ? 1 : -1);
        }
      } catch (error) {
        log(`ERROR: ${error.message}`);
      }
    });

    // Calculator stepper buttons
    els.calcStartUpBtn.addEventListener("click", () => {
      try { stepTimecodeByFrames(els.calcStartInput, 1, false); } catch (error) { log(`ERROR: ${error.message}`); }
    });
    els.calcStartDownBtn.addEventListener("click", () => {
      try { stepTimecodeByFrames(els.calcStartInput, -1, false); } catch (error) { log(`ERROR: ${error.message}`); }
    });
    els.calcEndUpBtn.addEventListener("click", () => {
      try { stepTimecodeByFrames(els.calcEndInput, 1, false); } catch (error) { log(`ERROR: ${error.message}`); }
    });
    els.calcEndDownBtn.addEventListener("click", () => {
      try { stepTimecodeByFrames(els.calcEndInput, -1, false); } catch (error) { log(`ERROR: ${error.message}`); }
    });

    for (const input of [els.calcStartInput, els.calcEndInput]) {
      input.addEventListener("focus", () => input.select());
      input.addEventListener("input", () => normalizeTimecodeInput(input, null, false));
      input.addEventListener("paste", event => {
        event.preventDefault();
        insertTimecodeDigits(input, event.clipboardData.getData("text"), false);
      });
      input.addEventListener("blur", () => normalizeTimecodeInput(input, null, false));
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") { guarded(calculateTimecodeDifference); return; }
        if (event.metaKey || event.ctrlKey || event.altKey) return;
        try {
          if (/^\d$/.test(event.key)) {
            event.preventDefault();
            insertTimecodeDigits(input, event.key, false);
            return;
          }
          if (event.key === "Backspace" || event.key === "Delete") {
            event.preventDefault();
            deleteTimecodeDigit(input, event.key === "Backspace", false);
            return;
          }
          if (event.key === "ArrowUp" || event.key === "ArrowDown") {
            event.preventDefault();
            stepTimecodeAtCaret(input, event.key === "ArrowUp" ? 1 : -1, false);
          }
        } catch (error) {
          log(`ERROR: ${error.message}`);
        }
      });
    }

    initCustomSelect(els.fpsInput, els.fpsSelectButton, els.fpsSelectMenu);

    els.fpsInput.addEventListener("change", () => {
      calculatorOffset = null;
      els.useCalcBtn.disabled = true;
      els.calcResult.textContent = "00:00:00:00";
      normalizeTimecodeInput(els.offsetInput);
      normalizeTimecodeInput(els.calcStartInput, null, false);
      normalizeTimecodeInput(els.calcEndInput, null, false);
      try { calculateTimecodeDifference(); } catch (e) {}
    });

    if (!("showDirectoryPicker" in window)) {
      setState("浏览器不支持", "warn");
      els.statusLine.textContent = "Chrome / Edge recommended";
      els.previewBtn.disabled = true;
    }

    async function addHandle(handle) {
      if (handle.kind === "directory") {
        directoryHandle = handle;
        const entries = [];
        for await (const entry of handle.values()) {
          if (entry.kind === "file" && WAV_SUFFIX.test(entry.name)) entries.push(entry);
        }
        entries.sort((a, b) => a.name.localeCompare(b.name));
        for (const entry of entries) {
          records.push(await scanWave(entry));
        }
      } else if (handle.kind === "file" && WAV_SUFFIX.test(handle.name)) {
        records.push(await scanWave(handle));
      }
    }

    async function handleDropItems(items) {
      let count = records.length;
      for (const item of items) {
        try {
          if (item.getAsFileSystemHandle) {
            const handle = await item.getAsFileSystemHandle();
            await addHandle(handle);
          }
        } catch (error) {
          log(`ERROR: ${error.message}`);
        }
      }
      if (records.length > count) {
        els.previewBtn.disabled = false;
        setState("已载入");
        els.statusLine.textContent = `已载入 ${records.length} 个 WAV；输入偏移后点击预览`;
        renderRows();
        log(`Dropped ${records.length - count} WAV file(s)`);
      }
    }

    function setupDragAndDrop() {
      const app = document.querySelector(".app");
      app.addEventListener("dragover", event => {
        event.preventDefault();
        event.stopPropagation();
        app.classList.add("drag-over");
      });
      app.addEventListener("dragleave", event => {
        event.preventDefault();
        event.stopPropagation();
        app.classList.remove("drag-over");
      });
      app.addEventListener("drop", async event => {
        event.preventDefault();
        event.stopPropagation();
        app.classList.remove("drag-over");
        await guarded(() => handleDropItems(event.dataTransfer.items));
      });
    }

    els.calcResult.textContent = "00:00:00:00";
    setupPwa();
    setupDragAndDrop();
  </script>
</body>
</html>
